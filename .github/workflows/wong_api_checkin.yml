name: WONG_API签到自动执行任务
on:
  schedule:
    # 分 时 日 月 星期
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  JueJinCheckIn:
    runs-on: ubuntu-latest
    env:
      COOKIE: ${{ secrets.WONG_API_COOKIE }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 检查仓库文件
        run: ls -al

      - name: 设置node环境
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 检查node环境
        run: node --version

      - name: 安装Node依赖
        run: npm install

      - name: 执行脚本
        run: node ./src/wong_api_checkin.js